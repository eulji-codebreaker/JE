<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style>
        .container {
            width: 336px;
            height: 148px;
            border-radius: 8px;
            border-width: 1px;
            padding: 24px;
            border: 1px solid #C2C2C2;
            align-items: center;
        }

        .font1 {
            text-align: center;
            font-size: 16px;
            color: black;        
            margin-bottom: 20px;
        }

        .container2 {
            width: 100%;
            height: 36px;
            border-radius: 8px;
            background: #17B75E;
            padding-top: 12px;
        }

        .font2 {
            width: 56px;
            height: 24px;
            margin-left: 116px;
            font-weight: 700;
            font-style: Bold;
            font-size: 20px;
            line-height: 100%;
            color: white;
        }

        .font3 {
            margin-top: 20px;
            gap: 8px;
            text-align: center;
        }
    </style>
    <div class="container">
        <div class="font1">사이트를 더 안전하고 편리하게 이용하세요.</div>
        <div class="container2">
            <div class="font2">로그인</div>
        </div>
        <div class="font3">
            <span>아이디 찾기 | </span>
            <span>비밀번호 찾기 |</span>
            <span>회원가입</span>
        </div>
    </div>
</body>

</html>
