<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style>
        .container {
            width: 332px;
            height: 100px;
            top: 16px;
            left: 16px;
            background-color: #FFE4E4;
            border-radius: 9px;
        }

        .container2 {
            width: 160px;
            height: 100px;
            border-radius: 8px;
            background-color: #FFB9B9;
        }

        .container3 {
            width: 96px;
            height: 19px;
            border-radius: 2px;
            padding: 2px;
            margin-left: 165px;
            margin-top: 10px;
            position: absolute;
            background-color: #FFB9B9;
        }

        .f {
            color: white;
            text-align: center;
        }

        .f2 {
            width: 123px;
            height: 19px;
            font-family: Inter;
            font-weight: 400;
            position: absolute;
            font-size: 16px;
            margin-left: 165px;
            margin-top: 40px;
        }

        .f3 {
            width: 113px;
            height: 17px;
            font-family: Inter;
            font-weight: 400;
            font-size: 14px;
            color: #8B8B8B;
            margin-left: 165px;
            margin-top: 70px;
            position: absolute;
        }
    </style>
    <div class="container">
        <div class="container2">
            <div class="container3">
                <div class='f'>반가워요!</div>
            </div>
            <div class='f2'>좋은하루보내세요!</div>
            <div class='f3'>날씨가 좋네요!</div>
        </div>
    </div>
</body>

</html>
