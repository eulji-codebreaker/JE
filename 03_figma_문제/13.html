<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style>
        .container {
            width: 250px;
            height: 225px;
            border: 1px orange;
            border-style: dashed;

        }

        .block1 {
            width: 250px;
            height: 150px;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            background-color: #FFB9B9;

        }

        .circle1 {
            border-radius: 999px;
            background-color: #D9D9D9;
            width: 24px;
            height: 24px;
            
           
        }

        p {
            font-family: Inter;
            font-weight: 400;
            font-style: Regular;
            font-size: 12px;
            line-height: 100%;
            letter-spacing: 0%;

        }
        .block2{
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .f {
            font-family: Inter;
            font-weight: 400;
            font-style: Regular;
            font-size: 12px;
            line-height: 100%;
            letter-spacing: 0%;
            width: 34px;
            height: 15px;

        }
    </style>

    <div class="container">
        <div class="block1"></div>
        <p>안녕하세요. 텍스트입니다</p>

        <div class="block2">
            <div class="circle1"></div>
             <div class="f">휴양조</div>
        </div>

    </div>
</body>

</html>
