<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <style>
        figure {
            left: 150px;
            top: 150px;
            
            background: skyblue;
            border-style: dashed;
        }

        @media(max-width: 480px) {
            .item4 {
                flex-direction: columnn;
                grid-template-columns: 100px 2fr 100px;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
        }

        .container {
            display: grid;
            justify-content: space-evenly;
            gap: 10px;
            width: 100vw;
            grid-template-columns: 100px 1fr 100px;
            background-color: aliceblue;
        }

        .container .item1 {
            font-size: 40px;
            grid-column-start: 1;
            grid-column-end: 4;
            background-color:  black;
            color: white ;

        }

        
    </style>

    <div class="container">
        <div class="item1">
            <header>
                머리부(Header)
            </header>
        </div>

        <div class="item2">
            <h4>네비게이션(Nav)</h4>
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Contact</li>
            </ul>
        </div>

        <div class="item3">
            <main>
                <article>
                    <h4>메인 콘텐츠(Main)</h4>
                </article>

                <figure>
                    양옆은 고정폭, 가운데는 가변폭!
                </figure>
                <p>hint!. 가운데 영역은 flex:1로 남는 공간을 차지합니다.</p>
            </main>
        </div>
        <div class="item4">
            <aside>
                <h4>사이드바(Aside)</h4>
                공지/광고/프로필 등
            </aside>
        </div>
    </div>
</body>

</html>
